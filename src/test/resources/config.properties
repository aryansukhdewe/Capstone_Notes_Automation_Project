# ============================================================
# Application Configuration - Notes App Capstone Project
# ============================================================
# WHY A PROPERTIES FILE:
# Externalizing config from code means we can change environment
# (dev/staging/prod) without recompiling. CI/CD pipelines can
# override these via -D system properties at runtime.
# ============================================================

# --- Base URLs ---
base.url=https://practice.expandtesting.com/notes/app/login
api.base.url=https://practice.expandtesting.com/notes/api

# --- Test User Credentials ---
# NOTE: In production, these would come from a secret manager (Vault, AWS SSM)
# For this demo app, storing in properties is acceptable
user.email=pbsbandu@gmail.com
user.password=Aryan@123
user.name=Aryan Bandu Sukhdewe

# --- Browser Configuration ---
browser=chrome
headless=false
browser.timeout=15
page.load.timeout=30

# --- Performance Thresholds ---
# WHY: FR-08 requires API response < 2000ms. We define it here so
# it can be adjusted without touching test code.
api.response.time.ms=2000
ui.page.load.time.ms=5000

# --- Reporting ---
reports.dir=reports
screenshots.dir=reports/screenshots
allure.results.dir=target/allure-results

# --- Retry ---
# WHY: Flaky tests in CI due to network latency. Max 1 retry prevents
# false negatives while keeping build times reasonable.
max.retry.count=1
